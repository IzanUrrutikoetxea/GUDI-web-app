input {
  # Recoge logs de stdout de los contenedores Docker via Beats o directamente
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [service] {
    mutate {
      add_tag => ["gudi"]
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "gudi-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
